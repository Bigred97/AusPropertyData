[build]
builder = "NIXPACKS"

[deploy]
# Use stdlib asyncio loop (not uvloop): uvloop + asyncpg TLS has hit bogus
# SSL verify failures against Supabase pooler on Nixpacks/Railway.
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port $PORT --loop asyncio"
# Liveness only — DB pool opens on first API request (see docs/CLI_DEPLOY.md)
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
